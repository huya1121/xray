server
    {
        listen 443 ssl http2;
        ssl on;
        ssl_certificate /etc/nginx/ssl/abc.com.cert.pem;
        ssl_certificate_key /etc/nginx/ssl/abc.com.key.pem;
        #ssl_protocols TLSv1.1 TLSv1.2;
        #开启tls1.3
        ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
        ssl_prefer_server_ciphers on;
        
        server_name abc.com;

        ##DNS 8
    resolver  8.8.8.8 valid=300s;
    resolver_timeout  10s;
    if ( $scheme = http ){
                return 301 https://$server_name$request_uri;
                }

        if ($http_user_agent ~* (baiduspider|360spider|haosouspider|googlebot|soso|bing|sogou|yahoo|sohu-search|yodao|YoudaoBot|robozilla|msnbot|MJ12bot|NHN|Twiceler)) {
                return  403;
                }

        location / {
            # ========== 核心反代设置 ==========
            proxy_pass https://www.kernel.org;
            proxy_ssl_server_name on;          # SNI 支持（必须，kernel.org 需要）
            proxy_ssl_name www.kernel.org;     # 明确 SNI 名称
            
            # ========== 请求头设置 ==========
            proxy_set_header Host www.kernel.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            #proxy_set_header Referer https://www.kernel.org;  # 可选，可能导致问题见下方
            
            # ========== 响应处理 ==========
            proxy_set_header Accept-Encoding "";  # 禁用压缩，否则 sub_filter 失效
            
            # ========== 内容替换（关键！按顺序）==========
            
            # 先替换完整的 HTTPS URL（从长到短，避免部分匹配）
            sub_filter 'https://www.kernel.org'  'https://$host';
            sub_filter 'https://kernel.org'      'https://$host';
            
            # 再替换 HTTP（如果有的话）
            sub_filter 'http://www.kernel.org'   'http://$host';
            sub_filter 'http://kernel.org'       'http://$host';
            
            # 最后替换无协议的纯域名
            sub_filter 'www.kernel.org'          '$host';
            sub_filter 'kernel.org'              '$host';
            
            sub_filter_once off;  # 替换所有出现的位置
            
            # ========== 缓冲区设置（大文件需要）==========
            proxy_buffering off;       # 实时传输，适合大文件下载
            # 或者调大缓冲区：
            # proxy_buffer_size 4k;
            # proxy_buffers 8 4k;
            
            # ========== 超时设置 ==========
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            
            # ========== Cookie 域名处理（重要！）==========
            proxy_cookie_domain www.kernel.org $host;
            proxy_cookie_domain kernel.org $host;
        }
        location /api/
        {
                if ($http_upgrade != "websocket") {
                        return 404;
                 }
                 proxy_redirect off;
                 proxy_pass http://127.0.0.1:50000; #必须与v2ray的inbound端口一致。
                 proxy_http_version 1.1;
                 proxy_set_header Upgrade $http_upgrade;
                 proxy_set_header Connection "upgrade";
                 proxy_set_header Host $http_host;
                 # Show real IP in v2ray access.log
                 proxy_set_header X-Real-IP $remote_addr;
                 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         }
        error_page 400 403 404 = https://$host;

        location ~ /.well-known {
            allow all;
        }
        access_log off;
    }
