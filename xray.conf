server {
    listen 80;
    listen [::]:80;
    server_name abc.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name abc.com;

    ssl_certificate /etc/nginx/ssl/abc.com.cert.pem;
    ssl_certificate_key /etc/nginx/ssl/abc.com.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    resolver 8.8.8.8 valid=300s;
    resolver_timeout 10s;

    location ^~ /api {
        proxy_pass http://127.0.0.1:50000;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    location / {
        proxy_pass https://www.kernel.org;
        proxy_ssl_server_name on;
        proxy_ssl_name www.kernel.org;

        proxy_set_header Host www.kernel.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";

        sub_filter 'https://www.kernel.org' 'https://$host';
        sub_filter 'https://kernel.org' 'https://$host';
        sub_filter 'http://www.kernel.org' 'http://$host';
        sub_filter 'http://kernel.org' 'http://$host';
        sub_filter 'www.kernel.org' '$host';
        sub_filter 'kernel.org' '$host';
        sub_filter_once off;

        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;

        proxy_cookie_domain www.kernel.org $host;
        proxy_cookie_domain kernel.org $host;
    }

    location ~ /.well-known {
        allow all;
    }

    error_log /var/log/nginx/abc.error.log;
    access_log /var/log/nginx/abc.access.log;
}
